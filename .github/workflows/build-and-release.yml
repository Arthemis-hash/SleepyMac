name: Build, Security & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Audit
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          PATTERNS=(
            "password\s*="
            "api[_-]?key\s*="
            "secret[_-]?key\s*="
            "token\s*="
            "AWS_ACCESS_KEY"
            "PRIVATE_KEY"
            "-----BEGIN.*KEY-----"
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(rg -i --glob '!{.git,.build}/*' "$pattern" SleepBabySleep/ 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "WARNING: Found potential secret matching '$pattern':"
              echo "$MATCHES"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ $FOUND -gt 0 ]; then
            echo "::warning::Found $FOUND potential secret(s). Review before release."
          else
            echo "No hardcoded secrets found."
          fi

      - name: Check for unsafe API usage
        run: |
          echo "=== Scanning for unsafe API calls ==="
          UNSAFE_APIS=(
            "system("
            "popen("
            "dlsym("
            "NSCreateObjectFileImageFromFile"
          )
          FOUND=0
          for api in "${UNSAFE_APIS[@]}"; do
            MATCHES=$(rg --glob '!{.git,.build}/*' "$api" SleepBabySleep/ 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "WARNING: Found unsafe API '$api':"
              echo "$MATCHES"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ $FOUND -gt 0 ]; then
            echo "::warning::Found $FOUND unsafe API call(s)."
          else
            echo "No unsafe API calls found."
          fi

      - name: Check for network access
        run: |
          echo "=== Checking for network access ==="
          NETWORK_CALLS=$(rg --glob '!{.git,.build}/*' "(URLSession|NSURLSession|NSURLConnection|CFNetwork)" SleepBabySleep/ 2>/dev/null || true)
          if [ -n "$NETWORK_CALLS" ]; then
            echo "::warning::App has network access capabilities:"
            echo "$NETWORK_CALLS"
          else
            echo "No network access detected. App is fully offline."
          fi

      - name: Check Swift version and dependencies
        run: |
          echo "=== Swift version ==="
          swift --version
          echo ""
          echo "=== Dependencies ==="
          DEPS=$(rg "dependency|package" Package.swift 2>/dev/null || true)
          if [ -z "$DEPS" ]; then
            echo "Zero external dependencies. Supply chain risk: MINIMAL."
          else
            echo "Dependencies found:"
            echo "$DEPS"
          fi

      - name: Build and analyze binary
        run: |
          swift build -c release
          BINARY=$(find .build/release -name "SleepBabySleep" -type f | head -1)
          if [ -n "$BINARY" ]; then
            echo "=== Binary info ==="
            file "$BINARY"
            echo ""
            echo "=== Linked frameworks ==="
            otool -L "$BINARY" | grep -E "/System/Library/Frameworks" | awk '{print "  " $1}'
            echo ""
            echo "=== Entitlements check ==="
            if codesign -d --entitlements :- "$BINARY" 2>/dev/null; then
              echo "Entitlements present."
            else
              echo "No entitlements embedded (expected for ad-hoc build)."
            fi
          fi

  build:
    name: Build & Test
    runs-on: macos-14
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
          fi
          xcodebuild -version
          swift --version

      - name: Build Release
        run: |
          chmod +x Scripts/build-app.sh
          ./Scripts/build-app.sh

      - name: Run Tests
        run: swift test || echo "Tests skipped (requires full Xcode)"

      - name: Create DMG
        run: |
          chmod +x Scripts/create-dmg.sh
          ./Scripts/create-dmg.sh

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 SleepBabySleep.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SleepBabySleep
          path: SleepBabySleep.dmg
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SleepBabySleep.dmg
          generate_release_notes: true
          body: |
            ## SleepMac — Menu Bar Sleep Timer

            A lightweight macOS menu bar app with 3 tools: **Chronometer**, **Countdown Timer**, and **Sleep Timer**.

            ### Installation
            1. Download `SleepBabySleep.dmg`
            2. Open the DMG
            3. Drag to Applications folder
            4. First launch: right-click > Open (Gatekeeper bypass)

            **SHA256:** `${{ steps.sha256.outputs.sha256 }}`

            ### Homebrew
            ```bash
            brew tap Arthemis-hash/tap
            brew install --cask sleepmac
            ```
